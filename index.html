<!DOCTYPE html>
<html>
<head>
  <title>TokHub</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#000000">
</head>

<body style="

height:100vh;
display:flex;
justify-content:center;

</html>
